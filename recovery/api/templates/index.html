<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recovery Bot</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --excellent: #22c55e;
      --good: #84cc16;
      --moderate: #f59e0b;
      --poor: #ef4444;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { color: var(--muted); font-size: 0.9rem; }
    nav { display: flex; gap: 4px; margin-left: auto; }
    nav button { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
    nav button.active, nav button:hover { background: var(--accent); border-color: var(--accent); color: white; }
    main { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }

    /* Today card */
    .today-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .metric-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .metric-card .value { font-size: 1.8rem; font-weight: 700; line-height: 1; }
    .metric-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
    .status-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
    .status-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }
    .status-Excellent { background: rgba(34,197,94,0.15); color: var(--excellent); }
    .status-Good { background: rgba(132,204,22,0.15); color: var(--good); }
    .status-Moderate { background: rgba(245,158,11,0.15); color: var(--moderate); }
    .status-Poor { background: rgba(239,68,68,0.15); color: var(--poor); }
    .status-badge::before { content: "●"; }
    .intensity-label { color: var(--muted); font-size: 0.9rem; }
    .intensity-label strong { color: var(--text); }
    ul.signals { list-style: none; margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    ul.signals li { font-size: 0.8rem; padding: 4px 10px; border-radius: 4px; background: rgba(99,102,241,0.1); color: var(--accent); }
    ul.signals li.warning { background: rgba(239,68,68,0.1); color: var(--poor); }

    /* Today activity columns */
    .activity-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 8px; }
    @media (max-width: 720px) { .activity-columns { grid-template-columns: 1fr; } }
    .activity-col { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .activity-col h3 { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .activity-col .empty { color: var(--muted); font-size: 0.85rem; }
    .cardio-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .cardio-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .cardio-item .act-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
    .cardio-item .act-meta { font-size: 0.8rem; color: var(--muted); }
    .strength-activity { margin-bottom: 16px; }
    .strength-activity:last-child { margin-bottom: 0; }
    .strength-activity .act-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
    .set-row { display: grid; grid-template-columns: 2fr 80px 90px; gap: 8px; align-items: center; font-size: 0.82rem; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .set-row:last-child { border-bottom: none; }
    .set-row select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 4px; font-size: 0.78rem; width: 100%; }
    .set-field { background: transparent; border: 1px solid transparent; color: var(--text); border-radius: 4px; padding: 2px 5px; font-size: 0.82rem; width: 100%; text-align: right; transition: border-color 0.15s; }
    .set-field:hover, .set-field:focus { border-color: var(--border); background: var(--bg); outline: none; }
    .set-field.saving { border-color: var(--accent); }
    .set-field.saved { border-color: var(--excellent); }
    .day-group { margin-bottom: 16px; }
    .day-group:last-child { margin-bottom: 0; }
    .day-label { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }

    /* Charts */
    .chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .chart-section h2 { font-size: 0.9rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .chart-controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .chart-controls select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; }
    canvas { max-height: 260px; }

    /* Activities table */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .sport-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; background: rgba(99,102,241,0.15); color: var(--accent); font-size: 0.75rem; }

    /* Tabs */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #loading { color: var(--muted); font-size: 0.85rem; padding: 20px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Recovery Bot</h1>
    <span>{{ user_name }}</span>
    <nav>
      <button class="active" onclick="showTab('today', this)">Today</button>
      <button onclick="showTab('trends', this)">Trends</button>
      <button onclick="showTab('activities', this)">Activities</button>
    </nav>
  </header>

  <main>
    <!-- TODAY TAB -->
    <div id="today" class="tab-content active">
      <div id="today-status" style="color:var(--muted);padding:20px 0">Loading...</div>
    </div>

    <!-- TRENDS TAB -->
    <div id="trends" class="tab-content">
      <div class="chart-controls">
        <select id="trend-days" onchange="loadTrends()">
          <option value="14">14 days</option>
          <option value="30" selected>30 days</option>
          <option value="60">60 days</option>
          <option value="90">90 days</option>
        </select>
      </div>
      <div class="chart-section"><h2>HRV (RMSSD) + Training Load</h2><canvas id="chart-hrv"></canvas></div>
      <div class="chart-section"><h2>Sleep</h2><canvas id="chart-sleep"></canvas></div>
      <div class="chart-section"><h2>Resting Heart Rate</h2><canvas id="chart-rhr"></canvas></div>
      <div class="chart-section"><h2>Overnight Stress</h2><canvas id="chart-stress"></canvas></div>
    </div>

    <!-- ACTIVITIES TAB -->
    <div id="activities" class="tab-content">
      <div class="chart-controls">
        <select id="act-days" onchange="loadActivities()">
          <option value="14">14 days</option>
          <option value="30" selected>30 days</option>
          <option value="60">60 days</option>
          <option value="90">90 days</option>
        </select>
      </div>
      <div class="chart-section">
        <table>
          <thead>
            <tr><th>Date</th><th>Name</th><th>Type</th><th>Duration</th><th>Distance</th><th>Avg HR</th><th>Effort</th><th></th></tr>
          </thead>
          <tbody id="activities-body"><tr><td colspan="7" style="color:var(--muted)">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

<script>
const chartInstances = {};

function showTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  btn.classList.add('active');
  if (name === 'trends') loadTrends();
  if (name === 'activities') loadActivities();
}

// ── Today ─────────────────────────────────────────────────────────────────
async function loadToday() {
  const el = document.getElementById('today-status');
  let data, acts;
  try {
    [data, acts] = await Promise.all([
      fetch('/api/today').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
      fetch('/api/today/activities').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
    ]);
  } catch (e) {
    el.innerHTML = `<div style="color:var(--poor);padding:20px 0">Failed to load today's data: ${e}</div>`;
    return;
  }

  const statusClass = `status-${data.status}`;
  const signalHTML = [
    ...data.signals.map(s => `<li>${s}</li>`),
    ...data.warnings.map(w => `<li class="warning">⚠ ${w}</li>`)
  ].join('');

  const m = data.metrics || {};
  const cards = [
    { label: 'HRV RMSSD', value: m.hrv_rmssd ? `${m.hrv_rmssd.toFixed(0)}ms` : '—', sub: m.hrv_status || '' },
    { label: 'vs Baseline', value: m.hrv_vs_baseline_pct != null ? `${m.hrv_vs_baseline_pct}%` : '—', sub: '' },
    { label: 'Resting HR', value: m.resting_hr ? `${m.resting_hr}bpm` : '—', sub: '' },
    { label: 'Sleep Score', value: m.sleep_score != null ? `${m.sleep_score}` : '—', sub: m.sleep_duration_hours ? `${m.sleep_duration_hours}h` : '' },
    { label: 'Overnight Stress', value: m.overnight_stress != null ? `${m.overnight_stress.toFixed(0)}` : '—', sub: m.overnight_stress_qualifier || '' },
    { label: 'Body Battery', value: m.body_battery_start != null ? `${m.body_battery_start}` : '—', sub: 'at wake' },
  ];

  // All known categories for dropdowns (union of today + all-time)
  const allCategories = acts.known_categories || [];

  const cardioHTML = acts.cardio.length
    ? groupByDate(acts.cardio).map(([ds, items]) => `
        <div class="day-group">
          <div class="day-label">${fmtDate(ds)}</div>
          ${items.map(a => `
            <div class="cardio-item">
              <div class="act-name"><a href="/activity/${a.id}" style="color:var(--text);text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text)'">${a.name}</a></div>
              <div class="act-meta">
                ${a.duration_min != null ? `${a.duration_min} min` : ''}
                ${a.avg_hr != null ? ` &middot; ${Math.round(a.avg_hr)} bpm avg` : ''}
              </div>
            </div>`).join('')}
        </div>`).join('')
    : '<div class="empty">No cardio in the last 7 days</div>';

  const strengthHTML = acts.strength.length
    ? groupByDate(acts.strength).map(([ds, acts2]) => `
        <div class="day-group">
          <div class="day-label">${fmtDate(ds)}</div>
          ${acts2.map(act => {
            const setsHTML = act.sets.map(s => {
              const opts = allCategories.map(c =>
                `<option value="${c}" ${c === s.exercise_category ? 'selected' : ''}>${fmtCat(c)}</option>`
              ).join('');
              return `
                <div class="set-row">
                  <select onchange="patchSet(${s.set_id}, {category: this.value})">${opts}</select>
                  <input class="set-field" type="number" min="0" step="1"
                    value="${s.reps ?? ''}" placeholder="reps"
                    onchange="patchSet(${s.set_id}, {reps: +this.value}, this)">
                  <input class="set-field" type="number" min="0" step="0.5"
                    value="${s.weight_lbs ?? ''}" placeholder="lbs"
                    onchange="patchSet(${s.set_id}, {weight_lbs: +this.value}, this)">
                </div>`;
            }).join('');
            return `
              <div class="strength-activity">
                <div class="act-name">${act.name}${act.duration_min != null ? ` <span style="color:var(--muted);font-weight:400;font-size:0.8rem">${act.duration_min} min</span>` : ''}</div>
                ${setsHTML || '<div class="empty">No sets recorded</div>'}
              </div>`;
          }).join('')}
        </div>`).join('')
    : '<div class="empty">No strength in the last 7 days</div>';

  el.innerHTML = `
    <div class="status-card">
      <div class="status-row">
        <span class="status-badge ${statusClass}">${data.status}</span>
        <span class="intensity-label">Recommended: <strong>${data.intensity}</strong></span>
        <span style="color:var(--muted);font-size:0.8rem">${data.date}</span>
      </div>
      ${signalHTML ? `<ul class="signals">${signalHTML}</ul>` : ''}
    </div>
    <div class="today-grid">
      ${cards.map(c => `
        <div class="metric-card">
          <div class="label">${c.label}</div>
          <div class="value">${c.value}</div>
          ${c.sub ? `<div class="sub">${c.sub}</div>` : ''}
        </div>
      `).join('')}
    </div>
    <div class="activity-columns">
      <div class="activity-col">
        <h3>Cardio</h3>
        ${cardioHTML}
      </div>
      <div class="activity-col">
        <h3>Strength</h3>
        ${strengthHTML}
      </div>
    </div>
  `;
}

function fmtCat(cat) {
  return cat.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function fmtDate(ds) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(ds + 'T00:00:00');
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
}

function groupByDate(items) {
  const map = new Map();
  for (const item of items) {
    if (!map.has(item.date)) map.set(item.date, []);
    map.get(item.date).push(item);
  }
  return [...map.entries()];
}

async function patchSet(setId, fields, el) {
  if (el) el.classList.add('saving');
  await fetch(`/api/strength/set/${setId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(fields),
  });
  if (el) {
    el.classList.remove('saving');
    el.classList.add('saved');
    setTimeout(() => el.classList.remove('saved'), 1200);
  }
}

// ── Trends ────────────────────────────────────────────────────────────────
async function loadTrends() {
  const days = document.getElementById('trend-days').value;
  const [trend, load] = await Promise.all([
    fetch(`/api/trend?days=${days}`).then(r => r.json()),
    fetch(`/api/training-load?days=${days}`).then(r => r.json()),
  ]);

  renderHRVChart(trend, load);
  renderSleepChart(trend);
  renderRHRChart(trend);
  renderStressChart(trend);
}

function mkChart(id, config) {
  if (chartInstances[id]) chartInstances[id].destroy();
  chartInstances[id] = new Chart(document.getElementById(id), config);
}

const gridColor = 'rgba(255,255,255,0.06)';
const baseOpts = {
  responsive: true,
  maintainAspectRatio: true,
  plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
  scales: {
    x: { ticks: { color: '#94a3b8', maxTicksLimit: 8, font: { size: 11 } }, grid: { color: gridColor } },
    y: { ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { color: gridColor } },
  },
};

function renderHRVChart(trend, load) {
  mkChart('chart-hrv', {
    type: 'bar',
    data: {
      labels: trend.labels,
      datasets: [
        {
          label: 'HRV RMSSD (ms)',
          data: trend.hrv,
          backgroundColor: 'rgba(99,102,241,0.7)',
          order: 2,
          yAxisID: 'y',
        },
        {
          label: 'Suffer Score',
          data: (() => {
            const map = {};
            load.labels.forEach((l, i) => { map[l] = load.suffer_score[i]; });
            return trend.labels.map(l => map[l] ?? 0);
          })(),
          type: 'line',
          borderColor: 'rgba(239,68,68,0.8)',
          backgroundColor: 'rgba(239,68,68,0.1)',
          fill: true,
          tension: 0.3,
          order: 1,
          yAxisID: 'y2',
          pointRadius: 2,
        },
      ],
    },
    options: {
      ...baseOpts,
      scales: {
        ...baseOpts.scales,
        y: { ...baseOpts.scales.y, title: { display: true, text: 'HRV (ms)', color: '#94a3b8' } },
        y2: { position: 'right', ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { drawOnChartArea: false },
               title: { display: true, text: 'Suffer', color: '#94a3b8' } },
      },
    },
  });
}

function renderSleepChart(trend) {
  mkChart('chart-sleep', {
    type: 'bar',
    data: {
      labels: trend.labels,
      datasets: [
        { label: 'Sleep Score', data: trend.sleep_score, backgroundColor: 'rgba(99,102,241,0.7)', yAxisID: 'y' },
        { label: 'Hours', data: trend.sleep_hours, type: 'line', borderColor: '#84cc16', tension: 0.3, yAxisID: 'y2', pointRadius: 2 },
      ],
    },
    options: {
      ...baseOpts,
      scales: {
        ...baseOpts.scales,
        y: { ...baseOpts.scales.y, min: 0, max: 100 },
        y2: { position: 'right', ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { drawOnChartArea: false } },
      },
    },
  });
}

function renderRHRChart(trend) {
  mkChart('chart-rhr', {
    type: 'line',
    data: {
      labels: trend.labels,
      datasets: [{ label: 'Resting HR (bpm)', data: trend.resting_hr, borderColor: '#f59e0b', tension: 0.3, fill: false, pointRadius: 2 }],
    },
    options: baseOpts,
  });
}

function renderStressChart(trend) {
  mkChart('chart-stress', {
    type: 'line',
    data: {
      labels: trend.labels,
      datasets: [{ label: 'Overnight Stress', data: trend.overnight_stress, borderColor: '#ef4444', tension: 0.3, fill: true, backgroundColor: 'rgba(239,68,68,0.1)', pointRadius: 2 }],
    },
    options: baseOpts,
  });
}

// ── Activities ────────────────────────────────────────────────────────────
async function loadActivities() {
  const days = document.getElementById('act-days').value;
  const data = await fetch(`/api/activities?days=${days}`).then(r => r.json());
  const tbody = document.getElementById('activities-body');
  if (!data.activities.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="color:var(--muted)">No activities found.</td></tr>';
    return;
  }
  tbody.innerHTML = data.activities.map(a => `
    <tr>
      <td>${a.date}</td>
      <td><a href="/activity/${a.id}" style="color:var(--text);text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text)'">${a.name || '—'}</a></td>
      <td><span class="sport-pill">${a.sport_type || '—'}</span></td>
      <td>${a.duration_min != null ? `${a.duration_min}min` : '—'}</td>
      <td>${a.distance_km != null ? `${a.distance_km}km` : '—'}</td>
      <td>${a.avg_hr != null ? `${a.avg_hr}bpm` : '—'}</td>
      <td>${a.suffer_score != null ? a.suffer_score : '—'}</td>
      <td><a href="https://www.strava.com/activities/${a.id}" target="_blank" rel="noopener" style="color:var(--accent);font-size:0.8rem;text-decoration:none" title="View on Strava">↗</a></td>
    </tr>
  `).join('');
}

// Init
loadToday();
</script>
</body>
</html>
